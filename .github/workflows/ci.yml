name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run linter (Ruff)
        run: uv run ruff check app/ tests/ --output-format=github

      - name: Run tests
        run: uv run pytest tests/ --ignore=tests/e2e/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  e2e:
    name: E2E Tests (local)
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meal_planner
          POSTGRES_PASSWORD: meal_planner
          POSTGRES_DB: meal_planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://meal_planner:meal_planner@localhost:5432/meal_planner
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Start app in background
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/app.pid

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          curl -sf http://localhost:8000/health || (echo "App failed to start" && exit 1)

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v

      - name: Stop app
        if: always()
        run: kill $(cat /tmp/app.pid) || true

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service "web"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  e2e-dev:
    name: E2E Tests (dev)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Wait for deployment to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$DEV_URL/health"; then
              echo "Dev app is ready"
              break
            fi
            echo "Waiting for dev deployment... ($i/30)"
            sleep 10
          done
          curl -sf "$DEV_URL/health" || (echo "Dev app failed health check" && exit 1)
        env:
          DEV_URL: ${{ secrets.DEV_URL }}

      - name: Run E2E tests against dev
        run: uv run pytest tests/e2e/ -v
        env:
          E2E_BASE_URL: ${{ secrets.DEV_URL }}
